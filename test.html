<!DOCTYPE html>
<head>
  <link href="./style.css" rel="stylesheet" />
  <link href="./favicon.png" rel="icon" type="image/x-icon" />
  <script src="./data.js"></script>
  <script src="./main.js"></script>
  <title>pkmn speed compare</title>
  <meta content="a tool for comparing two pokemon's speed" name="pkmn speed compare" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <div class="rootContainer">
    <!-- pokemon 1 -->
    <div id="pkmn1 "class="box">
      <div class="settingsContainer">
        <!-- establishing divs -->
        <div id="sprite1" class="sprite"><img src="./fallback-sprite.png"></div>
        <div id="name1" class="nameSelect"></div>
        <div id="stat1" class="statSelect"></div>
        <div id="level1" class="levelSelect"></div>
        <div id="check1" class="checkboxes"></div>
        
        <!-- load stuff -->
        <script>
          loadNameHtml("name1");
          loadStatHtml("stat1");
          loadLevelHtml("level1");
          loadCheckHtml("check1");
        </script>
      </div>
    </div>

    <!-- compare -->

    <!-- pokemon 2 -->
    <div id="pkmn2" class="box">
      <div class="settingsContainer">
        <!-- establishing divs -->
        <div id="sprite2" class="sprite"><img src="./fallback-sprite.png"></div>
        <div id="name2" class="nameSelect"></div>
        <div id="stat2" class="statSelect"></div>
        <div id="level2" class="levelSelect"></div>
        <div id="check2" class="checkboxes"></div>
        
        <!-- load stuff -->
        <script>
          loadNameHtml("name2");
          loadStatHtml("stat2");
          loadLevelHtml("level2");
          loadCheckHtml("check2");
        </script>
    </div>
  </div>


</body>
